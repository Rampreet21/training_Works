<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <script>
        let G = 85;
        console.log("Your marks:", G);

        if (G >= 90 && G <= 100) {
            console.log("Grade: A");
        } else if (G >= 80 && G < 90) {
            console.log("Grade: B");
        } else if (G >= 70 && G < 80) {
            console.log("Grade: C");
        } else if (G >= 60 && G < 70) {
            console.log("Grade: D");
        } else if (G >= 0 && G < 60) {
            console.log("Grade: F");
        } else {
            console.log("Invalid marks. Please enter a value between 0 and 100.");
        }



    </script>
</body>

</html>
